openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: identity
    description: Current user identity
  - name: feedback
    description: Beta feedback / bug reports
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /me:
    get:
      operationId: getMe
      tags: [identity]
      summary: Get current user identity
      description: Returns the authenticated user's Clerk userId.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user identity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /feedback:
    post:
      operationId: submitFeedback
      tags: [feedback]
      summary: Submit a beta feedback / bug report from the mobile app
      description: >-
        Files the report as an issue in the team's issue tracker so it lands
        in a real triage queue instead of only an email inbox. The mobile
        client falls back to its mailto: flow if this call fails.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FeedbackInput"
      responses:
        "201":
          description: Feedback filed as an issue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FeedbackResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "502":
          description: The issue tracker rejected or failed the request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Not permitted
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Conflicting state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  schemas:
    MeResponse:
      type: object
      required:
        - userId
      properties:
        userId:
          type: string

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Error:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    FeedbackInput:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          minLength: 1
          maxLength: 4000
        platform:
          type: string
          maxLength: 50
        appVersion:
          type: string
          maxLength: 50
        deviceInfo:
          type: string
          maxLength: 500

    FeedbackResult:
      type: object
      required:
        - ok
        - issueIdentifier
        - issueUrl
      properties:
        ok:
          type: boolean
        issueIdentifier:
          type: string
        issueUrl:
          type: string
