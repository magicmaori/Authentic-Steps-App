kind = "web"
previewPath = "/dashboard/"
title = "Authentic Steps — Agency Dashboard"
version = "1.0.0"
id = "artifacts/agency-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/dashboard/" ]
localPort = 24029

[services.development]
run = "pnpm --filter @workspace/agency-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/agency-dashboard", "run", "build" ]
publicDir = "artifacts/agency-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24029"
BASE_PATH = "/dashboard/"
