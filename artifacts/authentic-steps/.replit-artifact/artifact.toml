kind = "mobile"
previewPath = "/"
title = "Authentic Steps For Youth"
version = "1.0.0"
id = "artifacts/authentic-steps"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 25476

[services.development]
run = "pnpm --filter @workspace/authentic-steps run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/authentic-steps", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/authentic-steps", "run", "serve" ]

[services.env]
PORT = "25476"
BASE_PATH = "/"
